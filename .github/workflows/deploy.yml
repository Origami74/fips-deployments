name: Deploy FIPS Nodes

# Builds the fips binary from a specific ref/tag of the fips source repo,
# packages it into a Docker image, and deploys to all servers in the matrix.
#
# Triggers:
#   - push to master       → ALWAYS builds + deploys (cache bypassed)
#   - workflow_dispatch    → ALWAYS builds + deploys (cache bypassed)
#   - schedule (hourly)    → polls jmcorgan/fips@master; deploys only if SHA changed

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      fips_ref:
        description: "fips source ref to build (tag, branch, or commit SHA)"
        required: true
        default: "master"
      environment:
        description: "Deployment environment"
        type: choice
        options:
          - production
          - staging
        default: production
        required: true

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: fips-node
  IMAGE_TAG: latest
  FIPS_REPO: jmcorgan/fips

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 – Resolve fips ref to SHA and decide whether to deploy
  #
  # workflow_dispatch always deploys. Otherwise, look up the
  # fips-deployed-<sha> cache: hit means we already shipped this SHA, skip.
  # ---------------------------------------------------------------------------
  resolve:
    name: Resolve & decide
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
    steps:
      - name: Resolve fips ref to commit SHA
        id: sha
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ inputs.fips_ref || 'master' }}
        run: |
          SHA=$(gh api "repos/${FIPS_REPO}/commits/${REF}" -q .sha)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${FIPS_REPO}@${REF} → ${SHA}"

      - name: Check deployment marker cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: .deployed-marker
          key: fips-deployed-${{ steps.sha.outputs.sha }}
          lookup-only: true

      - name: Decide whether to deploy
        id: decide
        run: |
          case "${{ github.event_name }}" in
            workflow_dispatch|push)
              echo "should_deploy=true" >> "$GITHUB_OUTPUT"
              echo "${{ github.event_name }} — forcing deploy (cache bypassed)"
              ;;
            *)
              if [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]; then
                echo "should_deploy=false" >> "$GITHUB_OUTPUT"
                echo "SHA ${{ steps.sha.outputs.sha }} already deployed — skipping"
              else
                echo "should_deploy=true" >> "$GITHUB_OUTPUT"
                echo "New SHA ${{ steps.sha.outputs.sha }} — will build and deploy"
              fi
              ;;
          esac

  # ---------------------------------------------------------------------------
  # Job 2 – Check out fips at the resolved SHA, build binary, build Docker image
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ needs.resolve.outputs.sha }})
    # Pinned to 22.04 (glibc 2.35) so binaries run on debian:bookworm-slim
    # (glibc 2.36). ubuntu-latest = 24.04 produces binaries linked against
    # glibc 2.39 which won't load in the runtime image.
    runs-on: ubuntu-22.04
    needs: resolve
    if: needs.resolve.outputs.should_deploy == 'true'
    steps:
      - name: Check out fips source at ${{ needs.resolve.outputs.sha }}
        uses: actions/checkout@v6
        with:
          repository: ${{ env.FIPS_REPO }}
          ref: ${{ needs.resolve.outputs.sha }}
          path: fips-src

      - name: Check out fips-deployments (this repo) for the Dockerfile
        uses: actions/checkout@v6
        with:
          path: fips-deployments

      - name: Install build system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fips-src/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('fips-src/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build FIPS binary
        run: cargo build --release
        working-directory: fips-src

      - name: Stage binaries into Docker build context
        run: |
          cp fips-src/target/release/fips    fips-deployments/docker/fips
          cp fips-src/target/release/fipsctl fips-deployments/docker/fipsctl
          cp fips-src/target/release/fipstop fips-deployments/docker/fipstop

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} fips-deployments/docker

      - name: Save Docker image as tarball
        run: |
          docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} | gzip > /tmp/fips-node.tar.gz
          ls -lh /tmp/fips-node.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/fips-node.tar.gz
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 2 – Deploy to each server in the matrix
  #
  # Single-entry matrix for now. The "Resolve *" case-statement pattern
  # (needed because GitHub Actions does not support dynamic secret lookup like
  # ${{ secrets[var] }}) is omitted — secrets are referenced directly. To add
  # more servers, restore the resolve-step pattern from git history.
  #
  # Required (under environment "production"):
  #   secrets:
  #     SSH_PRIVATE_KEY              — SSH private key
  #     NSEC_FIPS_PROD_US_1          — 64-char hex nsec
  #   vars:
  #     DEPLOY_USER_FIPS_PROD_US_1   — SSH login user
  #     DEPLOY_HOST_FIPS_PROD_US_1   — hostname or IP
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [resolve, build]
    if: needs.resolve.outputs.should_deploy == 'true'
    environment: ${{ inputs.environment || 'production' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: FIPS_PROD_US_1
            # Comma-separated peers, each formatted as: npub|ip|port
            peers: ""

    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST_FIPS_PROD_US_1 }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER_FIPS_PROD_US_1 }}
      NSEC_VALUE:  ${{ secrets.NSEC_FIPS_PROD_US_1 }}

    steps:
      - name: Validate required secrets are present
        run: |
          missing=()
          [ -z "${DEPLOY_HOST}"  ] && missing+=("DEPLOY_HOST_FIPS_PROD_US_1")
          [ -z "${DEPLOY_USER}"  ] && missing+=("DEPLOY_USER_FIPS_PROD_US_1")
          [ -z "${NSEC_VALUE}"   ] && missing+=("NSEC_FIPS_PROD_US_1")
          [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] && missing+=("SSH_PRIVATE_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets in environment '${{ inputs.environment || 'production' }}':"
            for s in "${missing[@]}"; do echo "::error::  - $s"; done
            echo "::error::Set them under Settings → Environments → ${{ inputs.environment || 'production' }} → Secrets."
            exit 1
          fi

      - name: Download Docker image artifact
        uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          log-public-key: false

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Generate fips.yaml config
        env:
          PEERS: ${{ matrix.peers }}
        run: |
          if [ -z "$NSEC_VALUE" ]; then
            echo "Error: nsec is empty" >&2
            exit 1
          fi

          # Bind UDP/TCP to the public IP (not 0.0.0.0) so fips can publish a
          # concrete reachable endpoint in its Nostr advert. Requires the
          # container to use --network host (see "Deploy on remote server").
          {
            echo "node:"
            echo "  identity:"
            echo "    nsec: \"${NSEC_VALUE}\""
            echo "  discovery:"
            echo "    nostr:"
            echo "      enabled: true"
            echo "      advertise: true"
            echo ""
            echo "tun:"
            echo "  enabled: true"
            echo "  name: fips0"
            echo "  mtu: 1280"
            echo ""
            echo "dns:"
            echo "  enabled: true"
            echo "  bind_addr: \"127.0.0.1\""
            echo ""
            echo "transports:"
            echo "  udp:"
            echo "    bind_addr: \"${DEPLOY_HOST}:2121\""
            echo "    mtu: 1472"
            echo "    advertise_on_nostr: true"
            echo "    public: true"
            echo "  tcp:"
            echo "    bind_addr: \"${DEPLOY_HOST}:443\""
            echo "    advertise_on_nostr: true"
          } > /tmp/fips.yaml

          if [ -n "$PEERS" ]; then
            echo "" >> /tmp/fips.yaml
            echo "peers:" >> /tmp/fips.yaml
            IFS=',' read -ra PEER_LIST <<< "$PEERS"
            for peer in "${PEER_LIST[@]}"; do
              peer=$(echo "$peer" | xargs)
              [ -z "$peer" ] && continue
              IFS='|' read -r npub ip port <<< "$peer"
              echo "  - npub: \"${npub}\"" >> /tmp/fips.yaml
              echo "    addresses:" >> /tmp/fips.yaml
              echo "      - transport: udp" >> /tmp/fips.yaml
              echo "        addr: \"${ip}:${port}\"" >> /tmp/fips.yaml
            done
          fi

          echo "Generated config (nsec redacted):"
          grep -v "nsec:" /tmp/fips.yaml

      - name: Copy files to remote server
        run: |
          scp /tmp/fips-node.tar.gz /tmp/fips.yaml \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/"

      - name: Deploy on remote server
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s << 'REMOTE_SCRIPT'
          set -euo pipefail

          IMAGE_NAME="fips-node"
          IMAGE_TAG="latest"
          CONTAINER_NAME="fips-node"
          CONFIG_DIR="/etc/fips"

          echo "--- Stopping existing container (if any)..."
          sudo docker stop "$CONTAINER_NAME" 2>/dev/null || true
          sudo docker rm   "$CONTAINER_NAME" 2>/dev/null || true

          echo "--- Removing old image (if any)..."
          sudo docker rmi "$IMAGE_NAME:$IMAGE_TAG" 2>/dev/null || true

          echo "--- Loading new image..."
          sudo docker load < /tmp/fips-node.tar.gz
          sudo rm -f /tmp/fips-node.tar.gz

          echo "--- Installing config..."
          sudo mkdir -p "$CONFIG_DIR"
          sudo cp /tmp/fips.yaml "$CONFIG_DIR/fips.yaml"
          sudo rm -f /tmp/fips.yaml

          echo "--- Starting container..."
          # --network host: required so the container can bind directly to
          # the host's public IP (fips needs a concrete reachable address
          # for its Nostr advert; bridge networking would only expose the
          # container's private IP). Drops the need for -p port mappings.
          # Note: --sysctl net.ipv6.conf.* is not allowed with --network host
          # (those sysctls live in the network namespace). The host's IPv6
          # setting now applies directly; ensure IPv6 is enabled on the host
          # if needed (sysctl net.ipv6.conf.all.disable_ipv6=0).
          sudo docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --cap-add NET_ADMIN \
              --device /dev/net/tun:/dev/net/tun \
              --network host \
              -v "$CONFIG_DIR/fips.yaml:/etc/fips/fips.yaml:ro" \
              "$IMAGE_NAME:$IMAGE_TAG"

          echo "--- Container started:"
          sudo docker ps --filter "name=$CONTAINER_NAME" --format "  {{.Names}}  {{.Status}}  {{.Ports}}"
          REMOTE_SCRIPT

      - name: Verify deployment
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "sudo docker ps --filter 'name=fips-node' --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'"

  # ---------------------------------------------------------------------------
  # Job 3 – Save the deployment marker so future runs short-circuit on this SHA
  # ---------------------------------------------------------------------------
  save-marker:
    name: Save deployment marker
    runs-on: ubuntu-latest
    needs: [resolve, deploy]
    if: needs.resolve.outputs.should_deploy == 'true' && success()
    steps:
      - name: Write marker file
        run: |
          mkdir -p .deployed-marker
          echo "${{ needs.resolve.outputs.sha }} deployed at $(date -u +%FT%TZ)" \
            > .deployed-marker/info

      - name: Save cache
        uses: actions/cache/save@v5
        with:
          path: .deployed-marker
          key: fips-deployed-${{ needs.resolve.outputs.sha }}